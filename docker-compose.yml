services:
  vexyo:
    build: .
    container_name: vexyo
    restart: unless-stopped
    ports:
      - "127.0.0.1:3210:3000"
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/data
    volumes:
      - vexyo_data:/data
    networks:
      - your-network

volumes:
  vexyo_data:

networks:
  your-network:
    external: true
